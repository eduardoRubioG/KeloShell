name: Scheduled reminders

on:
  schedule:
    # 7am America/New_York is 11:00 UTC in daylight time and 12:00 UTC in standard time.
    # Retry through each candidate hour because GitHub scheduled runs can be delayed.
    - cron: '0,15,30,45 11,12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Evaluate today's reminders outside the 7am window
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: scheduled-reminders
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch due reminders
        env:
          DISPATCH_URL: ${{ secrets.REMINDER_DISPATCH_URL }}
          DISPATCH_TOKEN: ${{ secrets.REMINDER_DISPATCH_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          if [ "$FORCE" = "true" ]; then
            DISPATCH_URL="${DISPATCH_URL}?force=true"
          fi
          # Do NOT follow redirects: a 3xx here means the request was diverted
          # (edge redirect or Access login) before reaching the JSON dispatcher.
          # Capture status + sanitized redirect target so a 302 is diagnosable
          # instead of being silently swallowed as a "success".
          body="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$body" \
            --write-out '%{http_code} %{redirect_url}' \
            --request POST \
            --header "Authorization: Bearer ${DISPATCH_TOKEN}" \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            "$DISPATCH_URL")"
          http_code="${status%% *}"
          redirect_url="${status#* }"
          # Strip the query string (repo is public); keep scheme/host/path only.
          redirect_target="${redirect_url%%\?*}"
          echo "HTTP status: ${http_code}"
          if [ -n "$redirect_target" ]; then
            echo "Redirect target (query stripped): ${redirect_target}"
          fi
          echo "Response body:"
          cat "$body"
          echo
          # Only a 2xx JSON response from the dispatcher counts as success.
          case "$http_code" in
            2*) exit 0 ;;
            *)  echo "::error::Dispatch did not reach the function (HTTP ${http_code})"; exit 1 ;;
          esac
