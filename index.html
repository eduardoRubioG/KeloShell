<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>KeloShell — Workout logging</title>

  <base href="/" />

  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="Private workout logging companion for Eduardo's coach-managed spreadsheet." />

  <meta name="theme-color" content="#000000" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KeloShell" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <link rel="icon" href="/assets/icons/icon_24.png" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />

  <link rel="manifest" href="manifest.json" />

  <script type="module" src="/src/app/main.tsx"></script>
</head>

<body>
  <div id="root"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.onload = () => {
        navigator.serviceWorker.register(
          '/sw.js'
        );
      }
    }
  </script>
</body>

</html>
