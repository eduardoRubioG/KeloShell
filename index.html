<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>KeloShell</title>

  <base href="/" />

  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="KeloShell" />

  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KeloShell" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="icon" href="/assets/icons/icon_24.png" type="image/png" />

  <link rel="manifest" href="manifest.json" />

  <script type="module" src="/src/app-index.ts"></script>
</head>

<body>
  <app-index></app-index>

  <script>
    if ('serviceWorker' in navigator) {
      window.onload = () => {
        navigator.serviceWorker.register(
          '/sw.js'
        );
      }
    }
  </script>
</body>

</html>
